name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wallet
          POSTGRES_PASSWORD: wallet
          POSTGRES_DB: wallet_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wallet -d wallet_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint backend
        working-directory: backend
        run: ruff check app tests

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://wallet:wallet@localhost:5432/wallet_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret
        run: alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://wallet:wallet@localhost:5432/wallet_db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret
        run: pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Build backend Docker image
        run: docker build -t wallet-api ./backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Build frontend Docker image
        run: docker build -t wallet-frontend ./frontend

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder
        run: |
          echo "Deploy to Render/Railway via platform hooks or manual setup."
          echo "See README.md for deployment instructions."
