services:
  - type: web
    name: wallet-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: REDIS_URL
        sync: false

      - key: JWT_SECRET_KEY
        generateValue: true

      - key: EXCHANGE_BASE_URL
        value: https://api.frankfurter.dev/v1

      - key: ENVIRONMENT
        value: production

      - key: CORS_ORIGINS
        value: '["https://wallet-frontend.onrender.com"]'

    healthCheckPath: /health

  - type: web
    name: wallet-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend

    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://wallet-api.onrender.com
