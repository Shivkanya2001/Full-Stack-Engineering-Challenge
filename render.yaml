# Render deployment blueprint (reference)
services:
  - type: web
    name: wallet-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wallet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: wallet-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://wallet-frontend.onrender.com"]'
    buildCommand: pip install -r requirements.txt && alembic upgrade head

  - type: web
    name: wallet-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://wallet-api.onrender.com

  - type: pserv
    name: wallet-db
    runtime: postgres
    plan: starter

  - type: redis
    name: wallet-redis
    plan: starter
